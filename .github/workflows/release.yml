name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ninja opus sdl3

      - name: Configure
        run: cmake -S . -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release -DUDP_AUDIO_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/release --target lossy_audio_lab udp_audio_tests udp_audio_opus_tests -j 3

      - name: Test
        run: ctest --test-dir build/release --output-on-failure

      - name: Smoke test app
        run: ./build/release/lossy_audio_lab --headless

      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          package="dist/Lossy-Audio-Lab-macOS-arm64"
          mkdir -p "$package/docs"
          cp build/release/lossy_audio_lab "$package/"
          cp README.md "$package/"
          cp docs/*.md "$package/docs/"

          while read -r dep; do
            [ -n "$dep" ] || continue
            base="$(basename "$dep")"
            cp "$dep" "$package/$base"
            install_name_tool -change "$dep" "@executable_path/$base" "$package/lossy_audio_lab"
          done < <(otool -L "$package/lossy_audio_lab" | awk '/\/(opt\/homebrew|usr\/local)\/.*(SDL3|opus).*\.dylib/ { print $1 }')

          (cd dist && ditto -c -k --sequesterRsrc --keepParent Lossy-Audio-Lab-macOS-arm64 Lossy-Audio-Lab-macOS-arm64.zip)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lossy-Audio-Lab-macOS-arm64
          path: dist/Lossy-Audio-Lab-macOS-arm64.zip

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Lossy-Audio-Lab-macOS-arm64.zip

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          choco install ninja -y
          vcpkg install opus sdl3 --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build/release -G Ninja -DCMAKE_BUILD_TYPE=Release -DUDP_AUDIO_BUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build/release --target lossy_audio_lab udp_audio_tests udp_audio_opus_tests -j 3

      - name: Test
        shell: pwsh
        run: ctest --test-dir build/release --output-on-failure

      - name: Smoke test app
        shell: pwsh
        run: ./build/release/lossy_audio_lab.exe --headless

      - name: Stage package
        shell: pwsh
        run: |
          $package = "dist/Lossy-Audio-Lab-Windows-x64"
          New-Item -ItemType Directory -Force "$package/docs" | Out-Null
          Copy-Item "build/release/lossy_audio_lab.exe" "$package/"
          Copy-Item "README.md" "$package/"
          Copy-Item "docs/*.md" "$package/docs/"
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/*.dll" "$package/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$package" -DestinationPath "dist/Lossy-Audio-Lab-Windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lossy-Audio-Lab-Windows-x64
          path: dist/Lossy-Audio-Lab-Windows-x64.zip

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Lossy-Audio-Lab-Windows-x64.zip
